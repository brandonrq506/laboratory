name: Pull Request CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads code to lint/test it.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      # Actions pinned to full commit SHAs (mutable tags are a supply-chain
      # vector). Dependabot's github-actions ecosystem keeps these current.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: Install dependencies
        # `ci` installs exactly what's locked (no re-resolution); `--ignore-scripts`
        # blocks install-time payloads. Lint/test don't need the postinstall build.
        run: npm ci --ignore-scripts

      - run: npm run prettier
      - run: npm run lint
      # Type-check is the gate that catches dependency bumps which break types but
      # still pass lint/test (e.g. SemVer-minor TS changes). Critical once auto-merge
      # is on, since green CI is the only check before main.
      - run: npm run type-check
      - run: npm run test
